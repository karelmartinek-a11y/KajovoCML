name: Preload private MCP image on production

on:
  workflow_run:
    workflows: ["Build signed MCP handler images"]
    types: [completed]

permissions:
  contents: read
  packages: read

jobs:
  preload:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: [self-hosted, kcml-deploy]
    timeout-minutes: 15
    steps:
      - name: Preload signed private image and release the onboarding worker
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_COMMIT: ${{ github.event.workflow_run.head_sha }}
          GHCR_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          test -n "$GHCR_TOKEN"
          sudo --preserve-env=GHCR_TOKEN /usr/local/sbin/kcml-handler-preload-wrapper \
            "$SOURCE_COMMIT" "$GHCR_ACTOR"
