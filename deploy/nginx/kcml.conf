server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name ha-inventory.@PUBLIC_BASE_DOMAIN@;
  ssl_certificate @TLS_CERT_PATH@;
  ssl_certificate_key @TLS_KEY_PATH@;
  client_max_body_size 1k;
  location = /v1/catalog {
    allow 127.0.0.1;
    allow ::1;
    allow 89.221.222.92;
    allow 2a02:2b88:2:b5c::;
    # Permit host-local bridge/self-hairpin traffic from the production
    # egress path while still rejecting arbitrary public callers.
    allow 10.0.0.0/8;
    allow 100.64.0.0/10;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    allow fc00::/7;
    deny all;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    # The inventory application deliberately accepts only loopback clients.
    # Nginx already enforces the public-source allowlist above, so do not make
    # Uvicorn replace its loopback peer with the original public source IP.
    proxy_set_header X-Forwarded-For "";
    proxy_pass http://127.0.0.1:8103/internal/device-inventory;
  }
  location / { return 404; }
}

